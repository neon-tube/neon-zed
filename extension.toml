id = "neon"
name = "Neon"
version = "0.1.0"
schema_version = 1
description = "Neon language support: file-type registration and neon-lsp wiring."
authors = ["Neon contributors"]

languages = ["languages/neon"]

[lib]
kind = "Rust"
version = "0.7.0"

# Nothing about the server's feature set is declared here, and that is not an
# omission: Zed reads capabilities from the `initialize` response at runtime, so the
# ten `neon-lsp` advertises (see the `ServerCapabilities` literal in
# `lsp/src/main.rs`) light up without appearing in this file. An earlier version of
# this comment listed "diagnostics and formatting" as the whole set; it was a
# duplicate of the server's own list, and it went stale the moment the server grew.
# Do not reintroduce one.
[language_servers.neon-lsp]
name = "Neon Language Server"
languages = ["Neon"]

[language_servers.neon-lsp.language_ids]
Neon = "neon"

# ---------------------------------------------------------------------------
# The grammar. Zed fetches it by `repository` + `rev` and compiles it on its side; the
# grammar is now its own repository whose root IS `tree-sitter-neon`, which is exactly the
# layout Zed needs (`grammar.js` and `src/` at the root). Pin by a commit sha, not a branch.
[grammars.neon]
repository = "https://github.com/neon-tube/tree-sitter-neon"
rev = "cd0e852bcd3662763acf0a7edbbac21bbc6569f5"

# The highlight queries Zed uses live in `languages/neon/highlights.scm`, a copy of the
# grammar's queries with COARSE capture duplicates added: the grammar is written with
# Neovim's fine-grained names (`@keyword.conditional`, `@variable.member`, ...), and Zed
# maps a capture it does not know to nothing, so each fine capture carries its coarse root
# (`@keyword`, `@variable`, ...) beside it. See `languages/neon/README` note in README.md.
