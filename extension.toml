id = "neon"
name = "Neon"
version = "0.1.0"
schema_version = 1
description = "Neon language support: file-type registration and neon-lsp wiring."
authors = ["Neon contributors"]

languages = ["languages/neon"]

[lib]
kind = "Rust"
version = "0.7.0"

# Nothing about the server's feature set is declared here, and that is not an
# omission: Zed reads capabilities from the `initialize` response at runtime, so the
# ten `neon-lsp` advertises (see the `ServerCapabilities` literal in
# `lsp/src/main.rs`) light up without appearing in this file. An earlier version of
# this comment listed "diagnostics and formatting" as the whole set; it was a
# duplicate of the server's own list, and it went stale the moment the server grew.
# Do not reintroduce one.
[language_servers.neon-lsp]
name = "Neon Language Server"
languages = ["Neon"]

[language_servers.neon-lsp.language_ids]
Neon = "neon"

# ---------------------------------------------------------------------------
# No `[grammars.neon]` entry -- and this is now a packaging problem, not a missing
# grammar.
#
# A complete, verified tree-sitter grammar for Neon lives in THIS repository at
# `extra/tree-sitter-neon`, with `highlights.scm`, `indents.scm`, `locals.scm` and
# `textobjects.scm`. The repository now has a remote -- https://github.com/jkbbwr/neon --
# so a `repository` URL exists. What still blocks a one-line wire-up is that a Zed grammar
# is fetched from the *root* of that repository, and Neon's grammar sits at the subpath
# `extra/tree-sitter-neon`. `GrammarManifestEntry` takes `repository` plus `rev` and (as of
# the version last checked) no path field, so pointing it at `jkbbwr/neon` would have Zed
# look for `grammar.js`/`src/` at the repo root and find neither.
#
# So the remaining work is a packaging decision, not a missing URL: either publish the
# grammar as its own repository whose root *is* `tree-sitter-neon`, or confirm a newer Zed
# accepts a grammar subpath and use it. Once there is a fetchable grammar root, fill in the
# block below and add `grammar = "neon"` to `languages/neon/config.toml`:
#
#   [grammars.neon]
#   repository = "https://github.com/jkbbwr/neon"   # or a dedicated grammar repo
#   rev = "<a commit sha, not a branch -- Zed pins by revision>"
#
# One thing to do at the same time, not after: `extra/tree-sitter-neon/queries/` uses
# Neovim's fine-grained capture names (`@keyword.conditional`, `@variable.member`,
# `@type.definition`, ...). Zed maps a capture it does not know to nothing rather
# than to a fallback, so copying the queries across verbatim yields large unstyled
# regions. Add coarse duplicates (`@keyword`, `@property`, `@type`, `@number`)
# alongside the fine ones in the copy under `languages/neon/`.
#
# Checked against `zed_extension_api` 0.7.0 and `schema_version = 1`, which is what
# this extension targets. Whether some newer Zed added a local-path grammar option
# could NOT be checked from here: no `zed` binary and no network. If you are reading
# this with either available, re-check `GrammarManifestEntry` before trusting the
# paragraph above.
#
# Until then `grammar` stays absent, which Zed supports outright --
# `LanguageConfig.grammar` is `Option<Arc<str>>`. The language registers, the file
# type is recognised, and `neon-lsp` attaches; only tree-sitter-driven features
# (highlighting, structural selection, syntax folding) are missing. See README.md.
